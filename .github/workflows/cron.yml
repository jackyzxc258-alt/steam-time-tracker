name: Steam Time Collector

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Steam collection
        run: |
          curl -s -L -o /dev/null -w "%{http_code}" \
            "${{ secrets.VERCEL_URL }}/api/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
